name: WatchAccuracyPro
options:
  bundleIdPrefix: com.ticklab
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ko
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "0.2.0"
    DEVELOPMENT_TEAM: "QN975MTM7H"
    CODE_SIGN_STYLE: Automatic
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  WatchAccuracyPro:
    type: application
    platform: iOS
    sources:
      - path: WatchAccuracyPro
        excludes:
          - "Tests/**"
    info:
      path: WatchAccuracyPro/App/Info.plist
      properties:
        CFBundleDisplayName: TickLab
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
        NSMicrophoneUsageDescription: "시계의 정확도를 측정하려면 마이크가 필요합니다. 오디오는 분석 즉시 폐기되며 저장되거나 외부로 전송되지 않습니다."
        NSCameraUsageDescription: "시계 사진을 촬영해 컬렉션에 등록하려면 카메라가 필요합니다. 사진은 EXIF 위치 정보 제거 후 디바이스에만 저장됩니다."
        NSPhotoLibraryUsageDescription: "시계 사진을 보관함에서 선택해 등록할 수 있습니다."
        NSFaceIDUsageDescription: "TickLab 앱을 열 때 Face ID 로 잠금을 해제합니다. 시계 컬렉션과 측정 데이터를 안전하게 보호합니다."
        NSSupportsLiveActivities: YES
        BGTaskSchedulerPermittedIdentifiers:
          - com.ticklab.watchaccuracypro.longtest.refresh
        UIRequiredDeviceCapabilities:
          - armv7
          - microphone
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleLocalizations:
          - ko
          - en
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ticklab.watchaccuracypro
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: WatchAccuracyPro/App/WatchAccuracyPro.entitlements
    dependencies:
      - target: WatchAccuracyProWidget
        embed: true

  WatchAccuracyProWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WatchAccuracyProWidget
      - path: WatchAccuracyPro/Core/LiveActivity/MeasurementActivityAttributes.swift
      - path: WatchAccuracyPro/Core/Sharing/SharedSnapshotStore.swift
    info:
      path: WatchAccuracyProWidget/Info.plist
      properties:
        CFBundleDisplayName: TickLab Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ticklab.watchaccuracypro.widget
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: WatchAccuracyProWidget/WatchAccuracyProWidget.entitlements

  WatchAccuracyProTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WatchAccuracyPro/Tests/WatchAccuracyProTests
    dependencies:
      - target: WatchAccuracyPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ticklab.watchaccuracypro.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/WatchAccuracyPro.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/WatchAccuracyPro"
        GENERATE_INFOPLIST_FILE: YES

  WatchAccuracyProUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: WatchAccuracyPro/Tests/WatchAccuracyProUITests
    dependencies:
      - target: WatchAccuracyPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ticklab.watchaccuracypro.uitests
        TEST_TARGET_NAME: WatchAccuracyPro
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WatchAccuracyPro:
    build:
      targets:
        WatchAccuracyPro: all
        WatchAccuracyProWidget: all
        WatchAccuracyProTests: [test]
        WatchAccuracyProUITests: [test]
    test:
      targets:
        - WatchAccuracyProTests
        - WatchAccuracyProUITests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
